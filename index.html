<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运动员管理软件</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #1f2a2c;
      --muted: #657274;
      --line: #d8ded9;
      --track: #1f6f68;
      --track-dark: #164f4b;
      --court: #c65d35;
      --court-soft: #f3d6c8;
      --gold: #d3a12f;
      --blue: #345995;
      --danger: #b64545;
      --shadow: 0 10px 24px rgba(31, 42, 44, .08);
      --radius: 8px;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(31,111,104,.08) 1px, transparent 1px) 0 0 / 64px 64px,
        linear-gradient(0deg, rgba(198,93,53,.07) 1px, transparent 1px) 0 0 / 64px 64px,
        var(--bg);
      color: var(--ink);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button, .tab, .athlete-item {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 1px solid transparent;
      border-radius: 7px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    aside {
      padding: 22px;
      background: #142324;
      color: #eef4ef;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-height: 48px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #f6f7f4 0 8%, transparent 9%),
        conic-gradient(from 20deg, var(--court) 0 28%, var(--gold) 28% 47%, var(--track) 47% 100%);
      border: 2px solid rgba(255,255,255,.6);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .subtitle {
      margin: 3px 0 0;
      color: #adc0bd;
